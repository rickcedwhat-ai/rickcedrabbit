name = "rickcedrabbit"
main = "src/index.ts"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]

[vars]
REVIEW_PROVIDER = "claude"

# Secrets — set with: wrangler secret put <NAME>
# BOT_PAT
# WEBHOOK_SECRET
# ANTHROPIC_API_KEY
# UPSTASH_REDIS_REST_URL
# UPSTASH_REDIS_REST_TOKEN
# QSTASH_TOKEN
# QSTASH_CURRENT_SIGNING_KEY
# QSTASH_NEXT_SIGNING_KEY

# Optional vars (uncomment to override defaults)
# [vars]
# ALLOWED_REPOS = "rickcedwhat/my-repo,rickcedwhat/other-repo"
# SPEND_LIMIT_REPO_DAILY = "1"
# SPEND_LIMIT_GLOBAL_DAILY = "5"
# SPEND_LIMIT_GLOBAL_MONTHLY = "10"
# DASHBOARD_ISSUE = "1"
